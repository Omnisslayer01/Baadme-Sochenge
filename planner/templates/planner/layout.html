<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BaadmeSochenge — Focus Companion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --sky:        #d6f0fb;
      --sky-mid:    #b2dff5;
      --sky-deep:   #7ec8ee;
      --panel-bg:   rgba(255,255,255,0.82);
      --panel-border: rgba(120,190,230,0.45);
      --accent:     #3a9fd6;
      --accent-2:   #5dbfe8;
      --green:      #27ae60;
      --orange:     #e67e22;
      --red:        #e74c3c;
      --text-main:  #1a2e3b;
      --text-soft:  #6b8fa8;
      --bubble-bg:  #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      background: linear-gradient(160deg, #c9eaf9 0%, #d8f0fc 30%, #e8f6fd 55%, #f0d6eb 85%, #f5dff0 100%);
      position: relative;
    }

    /* ── Animated sky clouds ── */
    .cloud {
      position: fixed;
      background: rgba(255,255,255,0.55);
      border-radius: 999px;
      filter: blur(18px);
      pointer-events: none;
    }
    .cloud-1 { width:300px;height:80px;top:5%;left:-5%;animation:drift 22s linear infinite; }
    .cloud-2 { width:220px;height:60px;top:18%;right:0;animation:drift 28s linear infinite reverse; opacity:0.7; }
    .cloud-3 { width:180px;height:50px;top:38%;left:10%;animation:drift 34s linear infinite; opacity:0.5; }
    @keyframes drift {
      0%   { transform: translateX(0); }
      50%  { transform: translateX(40px); }
      100% { transform: translateX(0); }
    }

    /* ── Wrapper ── */
    .app-shell {
      display: flex;
      width: 100vw;
      height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* ══════ LEFT PANEL ══════ */
    .left-panel {
      width: 33%;
      flex-shrink: 0;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 32px;
      overflow: hidden;
    }

    /* character figure area */
    .character-area {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .character-img {
      width: 90%;
      max-height: 92vh;
      object-fit: contain;
      object-position: bottom center;
      filter: drop-shadow(0 8px 32px rgba(60,160,220,0.22));
      animation: charFloat 4s ease-in-out infinite;
    }

    @keyframes charFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    /* placeholder if no image */
    .char-placeholder {
      width: 75%;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, rgba(200,235,250,0.6), rgba(180,220,245,0.4));
      border-radius: 24px;
      border: 2px dashed rgba(120,190,230,0.5);
      font-family: 'Fredoka One', cursive;
      color: var(--accent);
      font-size: 5rem;
      gap: 12px;
      animation: charFloat 4s ease-in-out infinite;
      position: relative;
      bottom: 0;
    }

    .char-placeholder-label {
      font-size: 0.85rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--sky-deep);
      opacity: 0.8;
    }

    /* ── Speech Bubble ── */
    .speech-bubble {
      position: absolute;
      bottom: 28px;
      left: 16px;
      right: 8px;
      background: var(--bubble-bg);
      border-radius: 20px;
      padding: 14px 16px 14px 14px;
      box-shadow: 0 6px 24px rgba(60,140,200,0.18), 0 2px 6px rgba(0,0,0,0.07);
      display: flex;
      align-items: flex-start;
      gap: 10px;
      animation: bubblePop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
      min-height: 72px;
    }

    @keyframes bubblePop {
      from { opacity:0; transform: scale(0.85) translateY(12px); }
      to   { opacity:1; transform: scale(1) translateY(0); }
    }

    /* tail */
    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 36px;
      border-left: 10px solid transparent;
      border-right: 6px solid transparent;
      border-top: 12px solid white;
      filter: drop-shadow(0 3px 3px rgba(0,0,0,0.06));
    }

    .bubble-heart {
      font-size: 1.6rem;
      flex-shrink: 0;
      filter: drop-shadow(0 2px 4px rgba(220,80,120,0.3));
      animation: heartBeat 1.6s ease-in-out infinite;
    }

    @keyframes heartBeat {
      0%,100%{transform:scale(1);}
      15%{transform:scale(1.18);}
      30%{transform:scale(1);}
      45%{transform:scale(1.1);}
    }

    .bubble-text {
      font-family: 'Nunito', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      line-height: 1.55;
      color: var(--text-main);
      flex: 1;
    }

    .bubble-text .loading-dots span {
      animation: dotBounce 1.2s ease-in-out infinite;
      display: inline-block;
    }
    .bubble-text .loading-dots span:nth-child(2){animation-delay:0.2s;}
    .bubble-text .loading-dots span:nth-child(3){animation-delay:0.4s;}

    @keyframes dotBounce {
      0%,80%,100%{transform:translateY(0);}
      40%{transform:translateY(-6px);}
    }

    .regen-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 24px; height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: none;
      cursor: pointer;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      box-shadow: 0 2px 8px rgba(60,140,220,0.3);
      transition: transform 0.2s;
    }
    .regen-btn:hover { transform: rotate(90deg) scale(1.1); }
    .regen-btn.spinning { animation: spin 0.7s linear; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════ RIGHT PANEL ══════ */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px 24px 20px 12px;
      gap: 14px;
      overflow-y: auto;
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 10px;
    }

    .stat-chip {
      flex: 1;
      background: var(--panel-bg);
      border: 1.5px solid var(--panel-border);
      border-radius: 14px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(10px);
      box-shadow: 0 2px 10px rgba(60,140,200,0.08);
    }

    .stat-chip-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-soft);
      white-space: nowrap;
    }

    .stat-chip-value {
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem;
      color: var(--accent);
      line-height: 1;
      margin-left: auto;
    }

    /* ── Task panel ── */
    .task-panel {
      background: var(--panel-bg);
      border: 1.5px solid var(--panel-border);
      border-radius: 20px;
      padding: 18px 20px;
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 20px rgba(60,140,200,0.1);
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
      min-height: 0;
      overflow-y: auto;
    }

    .task-panel-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.2rem;
      color: var(--accent);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Task Item ── */
    .task-item {
      border-bottom: 1px solid rgba(120,190,230,0.2);
      padding: 12px 0;
    }
    .task-item:last-child { border-bottom: none; }

    .task-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .task-name {
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .task-num {
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      color: var(--accent);
    }

    /* energy badge */
    .energy-badge {
      font-size: 0.68rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 5px;
      font-style: italic;
    }

    .energy-label { color: var(--text-soft); }

    .energy-val-high  { color: var(--red); }
    .energy-val-med   { color: var(--orange); }
    .energy-val-low   { color: var(--green); }

    .energy-bar {
      display: inline-block;
      height: 8px;
      border-radius: 4px;
      min-width: 32px;
    }

    .bar-high   { background: var(--red);    width: 56px; }
    .bar-medium { background: var(--orange);  width: 44px; }
    .bar-low    { background: var(--green);   width: 32px; }

    /* subtask rows */
    .subtask-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #3a5a70;
      padding: 2px 0 2px 8px;
    }

    .subtask-icon { font-size: 0.85rem; }

    /* ── Energy footer ── */
    .energy-footer {
      background: var(--panel-bg);
      border: 1.5px solid var(--panel-border);
      border-radius: 14px;
      padding: 10px 18px;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 24px;
      box-shadow: 0 2px 10px rgba(60,140,200,0.07);
    }

    .energy-footer-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-soft);
      white-space: nowrap;
    }

    .big-bar {
      height: 10px;
      border-radius: 5px;
    }

    /* ── Action buttons ── */
    .action-row {
      display: flex;
      gap: 10px;
    }

    .btn-complete {
      flex: 1.4;
      background: linear-gradient(135deg, #3a9fd6 0%, #2b85bb 100%);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 20px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 16px rgba(58,159,214,0.38);
      transition: all 0.18s ease;
      letter-spacing: 0.01em;
    }

    .btn-complete:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(58,159,214,0.45);
    }

    .btn-complete:active { transform: scale(0.97); }

    .btn-skip {
      flex: 1;
      background: rgba(255,255,255,0.75);
      color: #c0392b;
      border: 2px solid rgba(231,76,60,0.3);
      border-radius: 14px;
      padding: 14px 20px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      backdrop-filter: blur(8px);
      transition: all 0.18s ease;
    }

    .btn-skip:hover {
      background: rgba(231,76,60,0.08);
      border-color: rgba(231,76,60,0.55);
      transform: translateY(-2px);
    }

    .btn-skip:active { transform: scale(0.97); }

    /* ── Active task highlight ── */
    .task-item.active-task {
      background: linear-gradient(to right, rgba(58,159,214,0.06), transparent);
      border-radius: 10px;
      padding-left: 8px;
      padding-right: 8px;
      margin: 0 -8px;
    }

    /* scrollbar */
    .task-panel::-webkit-scrollbar { width: 4px; }
    .task-panel::-webkit-scrollbar-track { background: transparent; }
    .task-panel::-webkit-scrollbar-thumb { background: rgba(120,190,230,0.4); border-radius: 2px; }
  </style>
</head>
<body>
    {% block body %}
    {% endblock %}
